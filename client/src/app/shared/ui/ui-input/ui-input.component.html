<div class="mb-3 position-relative">
  <label *ngIf="label" class="form-label fw-semibold small px-1">
    {{ label }}
  </label>

  <input
    [type]="type"
    class="form-control form-control-lg rounded-pill ps-4 shadow-none"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    (input)="handleInput($event)"
    (blur)="onTouched()"
  />

  <!-- Slot para iconos (ojo, etc.) -->
  <ng-content></ng-content>
</div>
