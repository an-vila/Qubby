<div class="mb-3">
  @if (label) {
    <label class="form-label fw-semibold text-dark small mb-1">{{ label }}</label>
  }

  <div class="position-relative">
    
    <input
      [type]="type"
      class="form-control form-control-lg rounded-3 ps-3 pe-5 shadow-none"
      [placeholder]="placeholder"
      [formControl]="control"
      style="font-size: 0.95rem; border-color: #dee2e6;"
      [ngClass]="{'is-invalid': control.invalid && control.touched}"
    >

    <ng-content></ng-content>

  </div>

  @if (control.invalid && control.touched) {
    <div class="text-danger small mt-1">
      <i class="bi bi-exclamation-circle"></i> Campo requerido
    </div>
  }
</div>
