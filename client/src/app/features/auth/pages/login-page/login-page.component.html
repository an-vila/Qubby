<div class="card p-4 shadow rounded-4 w-100 login-card">
  <h2 class="text-center mb-1">Bienvenido</h2>
  <p class="text-center text-muted mb-4">Inicia sesión en tu cuenta</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <!-- Email -->
    <ui-input
      type="email"
      placeholder="tu@email.com"
      formControlName="email"
      label="Correo electrónico"
      class="mb-3"
    ></ui-input>

    <!-- Contraseña con toggle -->
    <ui-input
      [type]="showPassword ? 'text' : 'password'"
      placeholder="********"
      formControlName="password"
      label="Contraseña"
      class="mb-3"
    >
      <button
        type="button"
        class="btn btn-outline-secondary position-absolute end-0 top-50 translate-middle-y me-2"
        (click)="togglePassword()"
      >
        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
      </button>
    </ui-input>

    <!-- Checkbox y link -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="form-check">
        <input
          class="form-check-input shadow-none"
          type="checkbox"
          formControlName="rememberMe"
          id="rememberMe"
        />
        <label class="form-check-label" for="rememberMe">Recordarme</label>
      </div>
      <a href="#" class="text-qubby small">¿Olvidaste tu contraseña?</a>
    </div>

    <!-- Botón login -->
    <ui-button type="submit" class="w-100 btn-qubby fw-bold py-2 shadow-sm rounded-3">
      Iniciar sesión
    </ui-button>

    <!-- Link a registro -->
    <p class="text-center mt-4 small">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="text-qubby">Regístrate aquí</a>
    </p>
  </form>
</div>
