<div class="card p-5 shadow rounded-4 w-100 text-center mx-auto" style="max-width: 450px;">
  
  @if (status === 'loading') {
    <div class="py-4">
      <div class="spinner-border text-qubby mb-3" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h3 class="h5 text-muted">{{ message }}</h3>
    </div>
  }

  @if (status === 'success') {
    <div class="py-2">
      <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
      
      <h2 class="mt-3 mb-2 fw-bold">¡Cuenta Activada!</h2>
      <p class="text-muted mb-4">{{ message }}</p>
      
      <ui-button 
        (click)="goToLogin()" 
        customClass="btn-qubby fw-bold w-100 py-2 shadow-sm rounded-3 text-white">
        Ir a Iniciar Sesión
      </ui-button>
    </div>
  }

  @if (status === 'error') {
    <div class="py-2">
      <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
      
      <h2 class="mt-3 mb-2 fw-bold">Algo salió mal</h2>
      <p class="text-muted mb-4">{{ message }}</p>
      
      <button (click)="goToLogin()" class="btn btn-outline-secondary w-100 py-2 rounded-3">
        Volver al inicio
      </button>
    </div>
  }
</div>
