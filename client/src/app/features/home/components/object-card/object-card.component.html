<div class="card border-0 shadow-sm rounded-4 h-100 p-3 object-card" [ngClass]="viewMode === 'list' ? 'is-list' : 'is-grid'">
  
  <div class="d-flex h-100 card-body-custom" [ngClass]="viewMode === 'list' ? 'flex-row gap-3' : 'flex-row flex-lg-column gap-3'">
    
    <div class="img-container rounded-3 overflow-hidden bg-light flex-shrink-0">
      <img [src]="image" [alt]="name" class="w-100 h-100 object-fit-cover">
    </div>

    <div class="content-container d-flex flex-column flex-grow-1 overflow-hidden w-100">
      
      <div>
        <h3 class="fw-bold text-dark mb-0 fs-6 fs-lg-5 text-truncate">{{ name }}</h3>
        <p class="text-muted small mb-2">{{ code }}</p>
      </div>

      <div class="tags-container d-flex gap-1 flex-wrap mb-3">
        @for (tag of tags; track tag) {
          <span class="badge rounded-pill bg-light text-muted px-2 py-1 fw-normal border" style="font-size: 0.75rem;">
            {{ tag }}
          </span>
        }
      </div>

      <div class="d-flex flex-row align-items-center gap-2 mt-auto w-100">
        <button (click)="viewDetails.emit()" class="btn btn-orange flex-grow-1 rounded-3 py-2 fw-bold" style="font-size: 0.85rem;">
          Ver detalles
        </button>
        <button (click)="edit.emit()" class="btn p-1 text-orange" title="Editar">
          <i class="bi bi-pencil fs-5"></i>
        </button>
        <button (click)="delete.emit()" class="btn p-1 text-orange" title="Eliminar">
          <i class="bi bi-trash fs-5"></i>
        </button>
      </div>

    </div>
  </div>
</div>
