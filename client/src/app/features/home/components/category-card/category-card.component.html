<div
  class="card border-0 shadow-sm transition-all cursor-pointer position-relative group"
  [routerLink]="['/box', id]"
  [ngClass]="viewMode === 'grid' ? 'rounded-4 p-4 d-flex flex-column justify-content-between align-items-center' : 'rounded-4 p-3 d-flex flex-row align-items-center gap-3'"
  [style.aspect-ratio]="viewMode === 'grid' ? '1 / 1' : 'auto'"
  style="transition: all 0.2s ease;"
>
  <div
    class="rounded-3 d-flex align-items-center justify-content-center bg-light icono-contenedor"
    [class.es-grid]="viewMode === 'grid'"
    [class.es-list]="viewMode === 'list'"
  >
    <img
      src="/images/iconoCaja.png"
      alt="Icono caja"
      class="imagen-caja"
    >
  </div>

  <div class="flex-grow-1 d-flex flex-column justify-content-center" [class.text-center]="viewMode === 'grid'" style="width: 100%;">
    
    @if (!isEditing) {
      <h3 class="fw-bold text-dark mb-1 text-truncate" [class.fs-5]="viewMode === 'grid'" [class.fs-6]="viewMode === 'list'">{{ name }}</h3>
    } @else {
      <input
        #editInput
        type="text"
        [(ngModel)]="editName"
        (keyup.enter)="onSave()"
        (keyup.escape)="onCancel()"
        (blur)="onSave()"
        (click)="$event.stopPropagation()"
        class="form-control fw-bold shadow-none mb-1 px-0 py-0 text-dark bg-transparent border-0"
        [class.text-center]="viewMode === 'grid'"
        [class.fs-5]="viewMode === 'grid'" 
        [class.fs-6]="viewMode === 'list'"
        style="outline: none; box-shadow: none; caret-color: rgb(255, 164, 0);"
        placeholder="Nombre de la caja..."
      >
    }
    
    <p class="text-muted small mb-0">{{ itemCount }} artículos</p>
  </div>

  @if (!isEditing) {
    <div class="d-flex gap-2 opacity-50 action-buttons">
      
      <button 
        (click)="$event.stopPropagation(); edit.emit()" 
        class="btn btn-sm p-2 boton-editar" 
        title="Editar">
        <i class="bi bi-pencil-fill"></i>
      </button>

      <button 
        (click)="$event.stopPropagation(); delete.emit()" 
        class="btn btn-sm p-2 boton-eliminar" 
        title="Eliminar">
        <i class="bi bi-trash-fill"></i>
      </button>

    </div>
  }
</div>
