<div
  class="card border-0 shadow-sm transition-all cursor-pointer position-relative group"
  [routerLink]="['/box', id]"
  [ngClass]="viewMode === 'grid' ? 'rounded-4 p-4 d-flex flex-column justify-content-between align-items-center' : 'rounded-4 p-3 d-flex flex-row align-items-center gap-3'"
  [style.aspect-ratio]="viewMode === 'grid' ? '1 / 1' : 'auto'"
  style="transition: all 0.2s ease;"
>
  <div
    class="rounded-3 d-flex align-items-center justify-content-center bg-light icono-contenedor"
    [class.es-grid]="viewMode === 'grid'"
    [class.es-list]="viewMode === 'list'"
  >
    <img src="/images/iconoCaja.png" alt="Icono caja" class="imagen-caja">
  </div>

  <div class="flex-grow-1 d-flex flex-column justify-content-center position-relative w-100" 
       [class.text-center]="viewMode === 'grid'">
    
    @if (!isEditing) {
      <h3 class="fw-bold text-dark mb-1 text-truncate" 
          [class.fs-5]="viewMode === 'grid'" 
          [class.fs-6]="viewMode === 'list'">
        {{ name }}
      </h3>
    } @else {
      <div class="edit-popover shadow-lg d-flex align-items-center p-1 rounded-3">
        <input
          #editInput
          type="text"
          [(ngModel)]="editName"
          (keyup.enter)="onSave()"
          (keyup.escape)="onCancel()"
          (click)="$event.stopPropagation()"
          class="form-control form-control-sm border-0 bg-transparent fw-bold flex-grow-1 shadow-none"
          placeholder="Nombre..."
          autofocus
        >
        <div class="d-flex gap-1 me-1">
          <button (click)="$event.stopPropagation(); onSave()" 
                  class="btn btn-success btn-xs shadow-sm d-flex align-items-center justify-content-center p-1"
                  style="width: 28px; height: 28px;">
            <i class="bi bi-check-lg"></i>
          </button>
          <button (click)="$event.stopPropagation(); onCancel()" 
                  class="btn btn-light btn-xs shadow-sm border d-flex align-items-center justify-content-center p-1"
                  style="width: 28px; height: 28px;">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
    }
    
    <p class="text-muted small mb-0" [class.invisible]="isEditing">{{ itemCount }} artículos</p>
  </div>

  <div class="d-flex gap-2 action-buttons" [class.invisible]="isEditing" [class.opacity-50]="!isEditing">
    <button (click)="$event.stopPropagation(); edit.emit()" class="btn btn-sm p-2 boton-editar">
      <i class="bi bi-pencil-fill"></i>
    </button>
    <button (click)="$event.stopPropagation(); delete.emit()" class="btn btn-sm p-2 boton-eliminar">
      <i class="bi bi-trash-fill"></i>
    </button>
  </div>
</div>
