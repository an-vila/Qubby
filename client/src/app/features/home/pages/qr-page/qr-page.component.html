<div class="min-vh-100 d-flex flex-column" style="background-color: #E3E3E3;">
  
  <header class="p-3 d-flex align-items-center shadow-sm" style="background-color: #535252;">
    <button (click)="volver()" class="btn p-1 border-0 d-flex align-items-center gap-2 text-orange">
      <i class="bi bi-chevron-left fs-5"></i>
      <span class="fs-5 fw-medium">Generar QR</span>
    </button>
  </header>

  <main class="flex-grow-1 d-flex flex-column align-items-center p-4">
    
    <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 w-100 mb-4 bg-white" style="max-width: 800px;">
      <h2 class="fs-5 fw-bold mb-4 text-dark text-start">Código QR</h2>
      
      <div class="text-center">
        <div class="border rounded-4 p-3 d-inline-block mb-4 shadow-sm">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://qubby.app/box/1" 
               alt="Código QR" 
               class="img-fluid" 
               style="width: 200px; height: 200px;">
        </div>

        <p class="text-muted small mb-2">CAT-1772100100388-1ou1odf7v</p>
        <p class="text-muted small mb-0 px-md-5 mx-md-5">
          Este código QR se ha generado automáticamente y es único para esta caja
        </p>
      </div>
    </div>

    <button (click)="imprimir()" class="btn btn-orange w-100 rounded-3 py-3 fs-5 fw-medium shadow-sm d-flex justify-content-center align-items-center gap-2" style="max-width: 600px;">
      <i class="bi bi-printer"></i>
      Imprimir QR
    </button>

  </main>
</div>
