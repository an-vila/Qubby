<div class="min-vh-100 pb-5 bg-scan-main">
  
  @if (pinNeeded) {
    <div class="position-fixed top-0 start-0 w-100 h-100 z-3 d-flex flex-column align-items-center justify-content-center bg-scan-main">
      
      <div class="text-center mb-4 fade-in">
        <div class="bg-white rounded-circle d-inline-flex p-4 mb-3 shadow-sm border">
          <i class="bi bi-shield-lock-fill text-scan-accent" style="font-size: 4rem;"></i>
        </div>
        <h2 class="text-dark fw-bold">Caja Protegida</h2>
        <p class="text-secondary">Introduce el PIN de 4 dígitos para ver el contenido</p>
      </div>

      <div class="bg-white p-4 rounded-4 shadow mx-3 text-center scale-in" style="max-width: 380px; width: 100%;">
        
        <form [formGroup]="pinForm" (ngSubmit)="verifyPin()">
          <input 
            type="password" 
            formControlName="pin"
            class="form-control text-center fw-bold mb-3 shadow-sm rounded-3 py-3 pin-input" 
            placeholder="••••" 
            maxlength="4" 
            inputmode="numeric"
            autofocus
          >
          
          @if (pinError) {
            <div class="alert alert-danger d-flex align-items-center justify-content-center py-2 border-0">
              <i class="bi bi-exclamation-triangle-fill me-2"></i> PIN Incorrecto
            </div>
          }

          <button type="submit" [disabled]="pinForm.invalid" class="btn btn-orange-qubby w-100 py-3 rounded-pill fw-bold shadow-sm fs-5">
            Desbloquear
          </button>
        </form>

      </div>
    </div>
  }
  
  <header class="sticky-top shadow-sm z-3 header-scan">
    <div class="mx-auto p-3 d-flex align-items-center justify-content-between scan-container">
      <button class="btn p-2 rounded-3 d-flex align-items-center justify-content-center btn-back-scan" routerLink="/home">
        <i class="bi bi-chevron-left fs-5 text-scan-accent"></i>
      </button>

      <div class="text-center flex-grow-1 text-white">
        <h1 class="fs-5 fw-bold mb-0">Caja {{ boxId }}</h1>
        <p class="small mb-0 opacity-75">{{ objetos.length }} objetos</p>
      </div>
      <div style="width: 40px;"></div>
    </div>

    <div class="mx-auto px-3 pb-3 scan-container">
      <div class="position-relative">
        <i class="bi bi-search position-absolute top-50 translate-middle-y ms-3 text-muted"></i>
        <input type="text" [formControl]="searchControl" placeholder="Buscar objeto..." 
               class="form-control border-0 rounded-3 ps-5 py-2 shadow-none bg-light">
      </div>
    </div>
  </header>

  <main class="p-3 mt-2">
    </main>

</div>
