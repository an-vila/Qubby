<div class="min-vh-100 bg-white pb-5">
  
  <header class="p-3 d-flex align-items-center shadow-sm sticky-top header-custom">
    <button (click)="volver()" class="btn p-1 border-0 d-flex align-items-center gap-2 btn-back">
      <i class="bi bi-chevron-left fs-4"></i>
    </button>
    <div class="ms-2">
      <h1 class="fs-5 fw-bold mb-0 title-orange">Nuevo Objeto</h1>
      <p class="small mb-0 text-white opacity-75">Añade un objeto a tu inventario</p>
    </div>
  </header>

  <form [formGroup]="objectForm" (ngSubmit)="handleSubmit()" class="container py-4 form-container">
    
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">Nombre del objeto *</label>
      <input type="text" formControlName="name"
             class="form-control form-control-lg border-2 shadow-none custom-input" placeholder="Ej: Laptop Dell XPS">
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">Categoría *</label>
      <select formControlName="category" class="form-select form-select-lg border-2 shadow-none custom-input text-secondary">
        <option value="" disabled selected>Selecciona una categoría</option>
        <option value="Electrónica">Electrónica</option>
        <option value="Hogar">Hogar</option>
        <option value="Herramientas">Herramientas</option>
        <option value="Ropa">Ropa</option>
        <option value="Libros">Libros</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">Descripción</label>
      <textarea formControlName="description" rows="3"
                class="form-control border-2 shadow-none custom-input" placeholder="Detalles adicionales..."></textarea>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">Imagen</label>
      
      <div class="border border-2 rounded-4 text-center p-5 cursor-pointer position-relative image-upload-box" 
           [class.border-dashed]="!imagePreview"
           (click)="fileInput.click()">
        
        @if (!imagePreview) {
          <div class="bg-white rounded-circle d-inline-flex p-3 shadow-sm mb-3">
            <i class="bi bi-camera fs-3 text-secondary"></i>
          </div>
          <h5 class="fw-bold text-dark mb-1">Subir imagen</h5>
          <p class="text-muted small mb-0">Toca para seleccionar una foto</p>
        } 
        
        @if (imagePreview) {
          <img [src]="imagePreview" class="img-fluid rounded-3 object-fit-cover preview-image">
          <div class="position-absolute top-0 end-0 m-3">
            <span class="badge bg-dark rounded-circle p-2 shadow"><i class="bi bi-pencil"></i></span>
          </div>
        }
        
        <input #fileInput type="file" class="d-none" accept="image/*" (change)="onFileSelected($event)">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">Etiquetas</label>
      <div class="d-flex gap-2 mb-3">
        <input type="text" [formControl]="tagInput" (keyup.enter)="handleAddTag()"
               class="form-control border-2 shadow-none custom-input" placeholder="Ej: frágil, invierno...">
        <button type="button" (click)="handleAddTag()" class="btn btn-orange px-3 rounded-3">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
      
      <div class="d-flex flex-wrap gap-2">
        @for (tag of tags; track tag) {
          <span class="badge rounded-pill bg-light text-dark border px-3 py-2 fs-6 fw-normal d-flex align-items-center gap-2">
            {{ tag }}
            <i class="bi bi-x fs-5 text-danger cursor-pointer" (click)="removeTag(tag)"></i>
          </span>
        }
      </div>
    </div>

    <div class="row mb-5 g-3">
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Cantidad</label>
        <input type="number" formControlName="quantity" class="form-control border-2 custom-input">
      </div>
      <div class="col-md-8">
        <label class="form-label fw-bold text-secondary">Estado</label>
        <div class="btn-group w-100 shadow-none">
          <button type="button" (click)="objectForm.get('status')?.setValue('saved')" class="btn" [ngClass]="objectForm.get('status')?.value === 'saved' ? 'btn-success' : 'btn-outline-secondary'">Guardado</button>
          <button type="button" (click)="objectForm.get('status')?.setValue('loaned')" class="btn" [ngClass]="objectForm.get('status')?.value === 'loaned' ? 'btn-warning text-white' : 'btn-outline-secondary'">Prestado</button>
          <button type="button" (click)="objectForm.get('status')?.setValue('damaged')" class="btn" [ngClass]="objectForm.get('status')?.value === 'damaged' ? 'btn-danger' : 'btn-outline-secondary'">Dañado</button>
        </div>
      </div>
    </div>

    <button type="submit" [disabled]="objectForm.invalid || isSubmitting" 
            class="btn btn-orange w-100 py-3 fs-5 fw-bold rounded-4 shadow-sm d-flex align-items-center justify-content-center gap-2">
      @if (showSuccess) {
        <i class="bi bi-check-circle-fill fs-4"></i> Objeto guardado
      } @else if (isSubmitting) {
        <span class="spinner-border spinner-border-sm"></span> Guardando...
      } @else {
        Guardar objeto
      }
    </button>
  </form>
</div>
