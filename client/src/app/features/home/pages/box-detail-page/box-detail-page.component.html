<div class="min-vh-100 pb-5" style="background-color: rgb(227, 227, 227)">

  <!-- Header con botón volver + nombre de la caja -->
  <header class="px-4 py-3 d-flex align-items-center gap-3 shadow-sm" style="background-color: white;">
    <button (click)="goBack()" class="btn btn-sm btn-light rounded-circle p-2">
      <i class="bi bi-arrow-left fs-5"></i>
    </button>
    <div>
      <h5 class="fw-bold mb-0">{{ boxName }}</h5>
      <span class="text-muted small">{{ items.length }} objeto{{ items.length !== 1 ? 's' : '' }}</span>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="px-4 py-4 max-w-6xl mx-auto">
    <div class="d-flex flex-column gap-3 fade-in">

      <!-- Botón añadir item -->
      <button
        (click)="handleNewItem()"
        class="btn w-100 rounded-4 text-white d-flex align-items-center justify-content-center gap-3 py-3 shadow-sm border-0"
        style="background-color: rgb(255, 164, 0)"
      >
        <i class="bi bi-plus-lg fs-4"></i>
        <span class="fw-bold fs-5">Nuevo objeto</span>
      </button>

      <!-- Loading -->
      @if (isLoading) {
        <div class="text-center py-5 text-muted">
          <div class="spinner-border text-warning" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
          <p class="mt-3">Cargando objetos...</p>
        </div>
      }

      <!-- Lista de items -->
      @if (!isLoading) {
        @for (item of items; track item.id) {
          <app-item-card
            [name]="item.name"
            [description]="item.description || ''"
            [isEditing]="item.isEditing || false"
            (save)="saveItem(item, $event)"
            (cancel)="cancelEdit(item)"
            (delete)="handleDeleteItem(item.id)"
            (edit)="handleEditItem(item.id)"
          >
          </app-item-card>
        }

        <!-- Estado vacío -->
        @if (items.length === 0) {
          <div class="text-center py-5 text-muted">
            <i class="bi bi-box-seam fs-1 d-block mb-3"></i>
            <p class="fs-5">Esta caja está vacía</p>
            <p class="small">Pulsa "Nuevo objeto" para añadir cosas</p>
          </div>
        }
      }

    </div>
  </main>

</div>
